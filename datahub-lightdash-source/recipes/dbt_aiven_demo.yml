# dbt → DataHub ingestion recipe for the Data Innovation Summit demo.
#
# Reads the dbt manifest generated by `dbt parse` in the lightdash-dbt repo
# and emits:
#   - dbt source entities for default.{customers,orders,products,order_items}
#   - dbt model entities for default.{customers_clean,orders_enriched,products_catalog}
#   - dbt source -> model lineage (table-level AND column-level, via dbt's
#     compiled SQL)
#   - Sibling links between each dbt entity and the corresponding ClickHouse
#     dataset already ingested by the ClickHouse source, so the UI merges them
#     into a single navigable entity.
#
# Generate manifest.json first:
#   cd ~/Documents/lightdash-dbt
#   . .venv-dbt/bin/activate
#   DBT_PROFILES_DIR=$PWD CLICKHOUSE_HOST=dummy CLICKHOUSE_PASSWORD=dummy dbt parse
#
# Then run:
#   export DATAHUB_GMS_URL='https://...8080.eur-1.aiven.app'
#   export DATAHUB_TOKEN='ey...'
#   datahub ingest -c recipes/dbt_aiven_demo.yml

source:
  type: dbt
  config:
    manifest_path: /Users/stan.dmitriev/Documents/lightdash-dbt/target/manifest.json

    # ClickHouse-adapter dbt sets ``schema`` to the ClickHouse database name and
    # leaves ``database`` empty. The DataHub dbt source aligns sibling URNs with
    # the warehouse source's URNs, which for ClickHouse are
    # ``urn:li:dataset:(urn:li:dataPlatform:clickhouse,<schema>.<table>,PROD)``.
    target_platform: clickhouse
    env: PROD

    # Emit every dbt entity type. We rely on dbt sources for the "raw CDC
    # tables" half of the lineage and dbt models for the views.
    entities_enabled:
      models: 'YES'
      sources: 'YES'
      seeds: 'NO'
      snapshots: 'NO'
      test_definitions: 'YES'
      test_results: 'NO'

    # Inject column-level lineage from dbt-compiled SQL via sqlglot — this is
    # the whole reason we're doing dbt ingestion.
    include_column_lineage: true
    infer_dbt_schemas: true

    # Don't overwrite descriptions / tags already on the warehouse-side entity.
    write_semantics: PATCH

    # Stateful ingestion = soft-deletion when models disappear from the
    # manifest (e.g. after `dbt clean`).
    stateful_ingestion:
      enabled: true
      remove_stale_metadata: true

sink:
  type: datahub-rest
  config:
    server: ${DATAHUB_GMS_URL}
    token: ${DATAHUB_TOKEN}
    mode: ASYNC

pipeline_name: dbt-lightdash-webstore
